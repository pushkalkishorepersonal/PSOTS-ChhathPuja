<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — PSOTS Chhath Puja</title>
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Playfair+Display:ital,wght@0,700;0,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="../config.js"></script>
  <style>
  .year-tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #f0d5b8;overflow-x:auto;position:sticky;top:52px;z-index:50;margin-bottom:1.5rem;border-radius:14px 14px 0 0}
  .year-tabs::-webkit-scrollbar{display:none}
  .year-tab{padding:.75rem 1.3rem;font-size:.82rem;font-weight:700;color:var(--lbr);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
  .year-tab.active{color:var(--or);border-bottom-color:var(--or)}
  .year-tab:hover{color:var(--or)}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.8rem;margin-bottom:2rem}
  .gallery-item{border-radius:14px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3;background:#f5ede0;border:1px solid rgba(200,100,0,.1);transition:transform .25s,box-shadow .25s}
  .gallery-item:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,8,0,.15)}
  .gallery-item img{width:100%;height:100%;object-fit:cover}
  .gallery-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;width:100%;height:100%;color:var(--lbr);font-size:.82rem;text-align:center;padding:1rem}
  .gallery-placeholder span{font-size:2rem}
  .year-stats{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1.5rem}
  .year-stat{background:var(--warm);border:1px solid #f0d5b8;border-radius:10px;padding:.6rem 1rem;font-size:.82rem;color:var(--br)}
  .year-stat strong{color:var(--or);font-weight:700}
  .upload-area{border:2px dashed #f0d5b8;border-radius:16px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--warm)}
  .upload-area:hover{border-color:var(--or);background:#fff5e8}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:1rem;cursor:pointer}
  .lightbox img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain}
  .lightbox-close{position:absolute;top:1rem;right:1.5rem;font-size:2rem;color:#fff;cursor:pointer;background:none;border:none;z-index:10}
  </style>
</head>
<body>
<nav class="page-nav">
  <a class="page-nav-back" href="../index.html"><span class="page-nav-back-icon">←</span> Home</a>
  <div class="page-nav-title">📸 Gallery</div>
  <div></div>
</nav>
<div class="page-hero">
  <span class="ph-icon">📸</span>
  <div class="ph-title">Event Gallery</div>
  <div class="ph-sub">Memories from 5 years of Chhath at PSOTS</div>
</div>
<div class="page-content">

  <div class="year-tabs" id="yearTabs">
    <button class="year-tab active" onclick="showYear(2025,this)">2025</button>
    <button class="year-tab" onclick="showYear(2024,this)">2024</button>
    <button class="year-tab" onclick="showYear(2023,this)">2023</button>
    <button class="year-tab" onclick="showYear(2022,this)">2022</button>
  </div>

  <div id="yearContent">
    <!-- Dynamic content loaded here -->
  </div>

  <div class="card" style="text-align:center;margin-top:2rem">
    <div class="card-title" style="justify-content:center">📲 Share Your Photos</div>
    <p style="font-size:.85rem;color:var(--br);line-height:1.6;margin-bottom:1rem">Have photos from previous years or this year's event? Send them to the committee and we'll add them to the gallery!</p>
    <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap">
      <a href="https://wa.me/919482088904?text=Hi%2C%20I%20have%20photos%20from%20Chhath%20Puja%20to%20share%20for%20the%20gallery%20%F0%9F%93%B8" target="_blank" style="text-decoration:none"><button class="btn-wa">📲 Send Photos via WhatsApp</button></a>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<div id="toast"></div>

<script>
const GALLERY_DATA = {
  2025: {
    stats: { contributors: 141, vratis: 15, collected: '2,35,553' },
    caption: 'Our 4th year — bigger than ever! 15 Vrati families, grand ghat with LED lighting, community kharna dinner for 400+ residents.',
    photos: []
  },
  2024: {
    stats: { contributors: 120, vratis: 12, collected: '2,17,048' },
    caption: '3rd year of Chhath at PSOTS. Extended ghat area, first cultural programme with local artists.',
    photos: []
  },
  2023: {
    stats: { contributors: 100, vratis: 10, collected: '1,83,630' },
    caption: '2nd year celebration. Community participation doubled! First time Thekua was distributed to all towers.',
    photos: []
  },
  2022: {
    stats: { contributors: 65, vratis: 8, collected: '1,25,300' },
    caption: 'Where it all began — the first Chhath Puja at PSOTS. A humble start with 65 contributing families.',
    photos: []
  }
};

function showYear(year, btn) {
  document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const d = GALLERY_DATA[year];
  const el = document.getElementById('yearContent');

  el.innerHTML = `
    <div class="year-stats">
      <div class="year-stat">👥 <strong>${d.stats.contributors}</strong> Contributors</div>
      <div class="year-stat">🙏 <strong>${d.stats.vratis}</strong> Vrati Families</div>
      <div class="year-stat">💰 <strong>₹${d.stats.collected}</strong> Collected</div>
    </div>
    <p style="font-size:.88rem;color:var(--br);line-height:1.6;margin-bottom:1.5rem">${d.caption}</p>
    <div class="gallery-grid" id="galleryGrid">
      ${d.photos.length > 0 ? d.photos.map((p,i) => `
        <div class="gallery-item" onclick="openLightbox('${p.url}')">
          <img src="${p.url}" alt="${p.caption || 'Chhath Puja ' + year}" loading="lazy"/>
        </div>
      `).join('') : generatePlaceholders(year)}
    </div>`;
}

function generatePlaceholders(year) {
  const scenes = [
    { icon: '🌅', text: 'Arghya at Ghat' },
    { icon: '🌅', text: 'Ghat Decoration' },
    { icon: '🍚', text: 'Kharna Prasad' },
    { icon: '🎤', text: 'Cultural Programme' },
    { icon: '🙏', text: 'Community Gathering' },
    { icon: '🎨', text: 'Decoration Work' },
  ];
  return scenes.map(s => `
    <div class="gallery-item">
      <div class="gallery-placeholder">
        <span>${s.icon}</span>
        <div>${s.text}<br/><small style="color:#c8a880">${year} · Photos coming soon</small></div>
      </div>
    </div>
  `).join('');
}

function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Load default year
showYear(2025, document.querySelector('.year-tab.active'));
</script>
</body>
</html>
