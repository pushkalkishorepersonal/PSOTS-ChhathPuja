  <style>
  /* ── Search ── */
  .filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.9rem;align-items:center}
  .fchip{background:var(--warm);border:1.5px solid #f0d5b8;color:var(--lbr);border-radius:50px;padding:.3rem .85rem;font-size:.74rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}

  .fchip:hover:not(.on){background:#fff0e0}
  .con-search{width:100%;padding:.72rem 1rem .72rem 2.6rem;border:1.5px solid #f0d5b8;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink);background:var(--warm);outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:.9rem}
  .con-search:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(232,92,0,.1)}
  .search-wrap{position:relative}
  .search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--lbr);font-size:.9rem;pointer-events:none}

  /* ── Year section ── */
  .year-section{margin-bottom:.75rem;border-radius:16px;overflow:hidden;border:1.5px solid #f0dfc8;box-shadow:0 2px 12px rgba(26,8,0,.04)}
  .year-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;background:var(--warm);cursor:pointer;user-select:none;transition:background .15s}
  .year-header:hover{background:#fff0e0}
  .year-header-left{display:flex;align-items:center;gap:.6rem}
  .year-badge{font-family:'Yatra One',serif;font-size:1rem;color:var(--or);font-weight:700}
  .year-meta{font-size:.74rem;color:#6b3a18}
  .year-total{font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;color:var(--or)}
  .year-chevron{font-size:.75rem;color:var(--lbr);transition:transform .25s;flex-shrink:0}
  .year-header.open .year-chevron{transform:rotate(180deg)}
  .year-body{display:none;padding:.6rem .65rem .7rem}
  .year-body.open{display:block}

  /* ── Top-3 podium ── */
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:.75rem;margin-bottom:1.2rem;padding:.5rem 0}
  .pod-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex:1;max-width:120px;animation:podIn .6s cubic-bezier(.34,1.56,.64,1) both}
  .pod-item:nth-child(1){animation-delay:.3s}.pod-item:nth-child(2){animation-delay:.1s}.pod-item:nth-child(3){animation-delay:.5s}
  @keyframes podIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:none}}
  .pod-pedestal{width:100%;border-radius:10px 10px 0 0;display:flex;align-items:flex-end;justify-content:center;padding:.3rem;position:relative}
  .pod-1{background:linear-gradient(180deg,#ffc200,#e09000);height:72px}
  .pod-2{background:linear-gradient(180deg,#c0c0c0,#909090);height:52px}
  .pod-3{background:linear-gradient(180deg,#cd8032,#a06020);height:40px}
  .pod-rank{font-size:1.2rem;position:absolute;top:-18px;left:50%;transform:translateX(-50%)}
  .pod-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:900;font-size:1.1rem;color:#fff;border:2.5px solid rgba(255,255,255,.6);box-shadow:0 4px 14px rgba(26,8,0,.2);background:linear-gradient(135deg,var(--or),#c93800);margin-bottom:.4rem;overflow:hidden}
  .pod-name{font-size:.72rem;font-weight:700;color:var(--ink);text-align:center;line-height:1.3;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pod-flat{font-size:.65rem;color:#6b3a18}
  .pod-amt{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:900;color:var(--or)}

  /* ── Contributor cards ── */
  @keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .con-card{background:#fff;border:1.5px solid #f0dfc8;border-radius:12px;padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.38rem;transition:box-shadow .2s,transform .2s,border-color .2s;animation:cardIn .35s cubic-bezier(.34,1.2,.64,1) both}
  .con-card:hover{box-shadow:0 4px 18px rgba(26,8,0,.08);transform:translateX(3px);border-color:#f0c8a0}
  .ci-rank{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:700;color:rgba(107,58,24,.45);text-align:center;min-width:28px}
  .ci-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:900;font-size:.85rem;color:#fff;flex-shrink:0}
  .ci-name{font-weight:600;font-size:.88rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci-sub{font-size:.68rem;color:#6b3a18;margin-top:.08rem}
  .ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;flex-shrink:0}
  .ci-amt{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.88rem;color:var(--or);white-space:nowrap}
  .ci-dot{width:8px;height:8px;border-radius:50%;background:#4caf50}
  .ci-dot.p{background:var(--gold)}

  /* ── Total bar ── */
  .total-bar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--or),#c93800);border-radius:14px;padding:.95rem 1.2rem;margin-top:.9rem;color:#fff;box-shadow:0 6px 24px rgba(232,92,0,.3)}
  .tb-label{font-size:.78rem;opacity:.92}
  .tb-value{font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:900;letter-spacing:-.01em}
  .tb-count{font-size:.72rem;opacity:.8;margin-top:.08rem}

  /* ── Skeleton ── */
  .skel-row{display:flex;align-items:center;gap:.65rem;padding:.75rem 1rem;background:var(--warm);border-radius:12px;border:1px solid #f0dfc8;margin-bottom:.42rem}
  .skel-av{width:34px;height:34px;border-radius:50%;flex-shrink:0}
  .skel-body{flex:1;display:flex;flex-direction:column;gap:5px}
  .skel-line{height:11px;border-radius:4px}
  .skel,.skel-line{background:linear-gradient(90deg,#f0e8d8 25%,#ffe8cc 50%,#f0e8d8 75%);background-size:200% 100%;animation:shim 1.5s infinite}
  @keyframes shim{to{background-position:-200% 0}}

  /* ── Legend ── */
  .legend{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.8rem;font-size:.76rem;color:#6b3a18}
  .leg-item{display:flex;align-items:center;gap:.35rem}
  .leg-dot{width:9px;height:9px;border-radius:50%}

  /* ── Source badge ── */
  .src-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.65rem;color:var(--lbr);background:var(--warm);border:1px solid #f0d5b8;border-radius:50px;padding:.15rem .55rem;margin-bottom:.7rem}

<script>
/* ── State ── */
let allData = [], filterMode = 'all', towerFilter = null;
const cfg = window.PSOTS || {};
const su = cfg.scriptUrl || localStorage.getItem('psots_script_url') || '';

/* ── Constants ── */
const PSOTS_TOWERS = new Set([1,2,3,4,5,8,9,10,11,12,14,15,16,17]);
const AV_COLORS = ['#e85c00','#c93800','#8b2800','#1a5276','#1a7a4e','#7b1fa2','#c62828'];

/* ── Helpers ── */
function avColor(name){ const c=(name||'?').toUpperCase().charCodeAt(0); return AV_COLORS[c % AV_COLORS.length]; }
function initial(name){ return (name||'?').charAt(0).toUpperCase(); }

function parseTower(flat) {
  const s = String(flat||'').replace(/\D/g,'');
  if (!s || s.length < 3) return null;
  const t2 = parseInt(s.slice(0,2));
  if (s.length >= 5 && t2 >= 10 && PSOTS_TOWERS.has(t2)) return t2;
  const t1 = parseInt(s.slice(0,1));
  return PSOTS_TOWERS.has(t1) ? t1 : null;
}

/* ── Firestore loader ── */
let _db = null;
function _initFirestore() {
  try {
    const cfg = window.PSOTS_FIREBASE_CONFIG;
    if (!cfg || cfg.apiKey === 'FILL_IN' || typeof firebase === 'undefined') return false;
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    _db = firebase.firestore();
    return true;
  } catch(e) { return false; }
}

async function _loadFromFirestore() {
  if (!_db) return null;
  try {
    const snap = await _db.collection('contributions').get();
    return snap.docs.map(d => d.data());
  } catch(e) { return null; }
}

/* ── Main load ── */
async function loadList() {
  const el = document.getElementById('conList');
  el.innerHTML = `<div class="skel-row"><div class="skel-av skel"></div><div class="skel-body"><div class="skel-line skel" style="width:65%"></div><div class="skel-line skel" style="width:40%"></div></div></div>`.repeat(4);
  document.getElementById('srcBadge').style.display = 'none';

  // Layer 1 — Firestore (fast, offline-capable)
  if (_initFirestore()) {
    const fsData = await _loadFromFirestore();
    if (fsData && fsData.length) {
      allData = fsData;
      _showSrcBadge('🔥 Live from Firestore');
      renderList();
      _buildTowerFilter();
      return;
    }
  }

  // Layer 2 — Apps Script
  if (su && !su.includes('YOUR_APPS')) {
    try {
      const r = await fetch(su + '?action=list');
      const d = await r.json();
      if (d.contributors?.length) {
        allData = d.contributors;
        _showSrcBadge('☁️ Live from Google Sheets');
        renderList();
        _buildTowerFilter();
        return;
      }
    } catch(e) { /* fall through */ }
  }

  // Layer 3 — history.json static fallback
  try {
    const r = await fetch('../data/history.json');
    if (r.ok) {
      const g = await r.json();
      if (g.history?.length) {
        allData = g.history;
        _showSrcBadge('📄 From local data');
        renderList();
        _buildTowerFilter();
        return;
      }
    }
  } catch(e) {}

  // Empty state
  allData = [];
  renderList();
}

function _showSrcBadge(text) {
  const b = document.getElementById('srcBadge');
  b.textContent = text;
  b.style.display = 'inline-flex';
}

function _buildTowerFilter() {
  const towers = [...new Set(allData.map(r => parseTower(r.flat)).filter(Boolean))].sort((a,b)=>a-b);
  if (towers.length < 2) return;
  const row = document.getElementById('towerFilter');
  row.style.display = 'flex';
  const allChip = `<div class="fchip on" onclick="setTower(null,this)">All</div>`;
  const chips = towers.map(t => `<div class="fchip" onclick="setTower(${t},this)">T${t}</div>`).join('');
  row.innerHTML = `<span style="font-size:.74rem;color:#6b3a18;font-weight:600;flex-shrink:0">Tower:</span>${allChip}${chips}`;
}

function setTower(t, el) {
  towerFilter = t;
  document.querySelectorAll('#towerFilter .fchip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  renderList();
}

/* ── Podium (flat-grouped) ── */
function buildPodiumHTML(flatGroups) {
  const top = flatGroups.slice(0, 3);
  if (top.length < 2) return '';
  const medals = ['🥇','🥈','🥉'];
  const order = top.length >= 2 ? [1, 0, 2] : [0];
  const items = order.filter(i => top[i]);
  return `<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--or);font-weight:700;text-align:center;margin-bottom:.6rem">🏆 Top Contributors</div>
  <div class="podium">${items.map(idx => {
    const g = top[idx];
    const col = avColor(g.names[0] || g.flat);
    const tower = g.tower;
    return `<div class="pod-item">
      <div class="pod-av" style="background:linear-gradient(135deg,${col},${col}cc)">${initial(g.names[0] || g.flat)}</div>
      <div class="pod-name">${(g.names[0] || g.flat).split(' ')[0]}</div>
      <div class="pod-flat">Flat ${g.flat}${tower?' · T'+tower:''}</div>
      <div class="pod-amt">₹${Math.round(g.amount).toLocaleString('en-IN')}</div>
      <div class="pod-pedestal pod-${idx+1}"><div class="pod-rank">${medals[idx]}</div></div>
    </div>`;
  }).join('')}</div>`;
}

/* ── Count-up animation ── */
function animateCount(el, target) {
  const dur = 900, start = Date.now(), from = 0;
  const tick = () => {
    const p = Math.min(1, (Date.now()-start)/dur);
    const ease = 1 - Math.pow(1-p, 3);
    el.textContent = '₹' + Math.round(from + (target-from)*ease).toLocaleString('en-IN');
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

/* ── Group raw records by flat ── */
function groupByFlat(records) {
  const map = {};
  records.forEach(r => {
    const flat = String(r.flat || '—').trim();
    if (!map[flat]) map[flat] = { flat, names: [], amount: 0, anyVerified: false, tower: parseTower(flat), accountType: r.accountType || '' };
    const g = map[flat];
    if (r.name && !g.names.includes(r.name)) g.names.push(r.name);
    g.amount += parseFloat(r.amount) || 0;
    if (r.status?.includes('Received')) g.anyVerified = true;
  });
  return Object.values(map);
}

function flatDisplayName(names) {
  if (!names.length) return '—';
  if (names.length === 1) return names[0];
  if (names.length === 2) return names[0] + ' & ' + names[1].split(' ')[0];
  return names[0] + ' +' + (names.length - 1) + ' more';
}

/* ── Card rows (flat-grouped) ── */
function cardsHTML(flatGroups) {
  return flatGroups.map((g, i) => {
    const col = avColor(g.names[0] || g.flat);
    const tower = g.tower;
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
    const delay = Math.min(i * 30, 300);
    const displayName = flatDisplayName(g.names);
    const namesTooltip = g.names.length > 1 ? g.names.join(', ') : '';
    return `<div class="con-card" style="animation-delay:${delay}ms"${namesTooltip ? ` title="${namesTooltip}"` : ''}>
      <div class="ci-rank">${rankLabel}</div>
      <div class="ci-av" style="background:linear-gradient(135deg,${col},${col}cc)">${initial(g.names[0] || g.flat)}</div>
      <div style="flex:1;min-width:0">
        <div class="ci-name">${displayName}</div>
        <div class="ci-sub">Flat ${g.flat}${tower?' · Tower '+tower:''}</div>
      </div>
      <div class="ci-right">
        <div class="ci-amt">₹${Math.round(g.amount).toLocaleString('en-IN')}</div>
        <div class="ci-dot ${g.anyVerified?'':'p'}" title="${g.anyVerified?'Verified ✅':'Pending verification'}"></div>
      </div>
    </div>`;
  }).join('');
}

function toggleYear(yr) {
  const body = document.getElementById('yb-' + yr);
  const hdr  = document.getElementById('yh-' + yr);
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
}

/* ── Main render ── */
function renderList() {
  const q = document.getElementById('searchInp').value.toLowerCase();

  // Filter raw records
  let f = allData.filter(r => {
    if (towerFilter && parseTower(r.flat) !== towerFilter) return false;
    if (filterMode==='verified' && !r.status?.includes('Received')) return false;
    if (filterMode==='portal'   && !r.accountType?.includes('Portal')) return false;
    if (filterMode==='guest'    && !r.accountType?.includes('Guest')) return false;
    if (q) {
      const nameMatch = (r.name||'').toLowerCase().includes(q);
      const flatMatch = String(r.flat).toLowerCase().includes(q);
      if (!nameMatch && !flatMatch) return false;
    }
    return true;
  });

  // Grand totals from verified raw records
  const grandVerifiedAmt = f.filter(r => r.status?.includes('Received')).reduce((s,r) => s+(parseFloat(r.amount)||0), 0);
  // Grand unique flats
  const grandFlats = new Set(f.map(r => String(r.flat||'—').trim()+'_'+(r.year||2026))).size;

  document.getElementById('subLine').textContent = grandFlats + ' household' + (grandFlats!==1?'s':'') + ' across all years · ₹' + Math.round(grandVerifiedAmt).toLocaleString('en-IN') + ' total';
  animateCount(document.getElementById('totalAmt'), grandVerifiedAmt);
  document.getElementById('verCount').textContent = new Set(f.filter(r=>r.status?.includes('Received')).map(r=>String(r.flat||'')+'_'+(r.year||2026))).size + ' verified households';

  const byYear = {};
  const _activeYr = (window.PSOTS && window.PSOTS.activeYear) || new Date().getFullYear();
  f.forEach(r => { const yr = r.year || _activeYr; (byYear[yr] = byYear[yr] || []).push(r); });
  const years = Object.keys(byYear).map(Number).sort((a,b) => b-a);

  if (!years.length) {
    const isSearch = q || filterMode !== 'all' || towerFilter;
    document.getElementById('conList').innerHTML = isSearch
      ? '<div class="empty"><span class="empty-icon">🔍</span>No contributors match your search.</div>'
      : `<div class="empty" style="text-align:center;padding:2rem 1rem">
           <div style="font-size:2.4rem;margin-bottom:.6rem">🌅</div>
           <div style="font-family:'Yatra One',serif;font-size:1rem;color:var(--or);margin-bottom:.4rem">Contributions opening soon</div>
           <div style="font-size:.84rem;color:#6b3a18;line-height:1.65;max-width:280px;margin:0 auto">Be among the first to support PSOTS Chhath Puja 2026!</div>
           <a href="payment.html" style="display:inline-block;margin-top:1.1rem;text-decoration:none;background:linear-gradient(135deg,var(--or),#c93800);color:#fff;border-radius:50px;padding:.65rem 1.6rem;font-size:.88rem;font-weight:700;font-family:'DM Sans',sans-serif">💰 Contribute Now</a>
         </div>`;
    return;
  }

  const currentYear = new Date().getFullYear();

  document.getElementById('conList').innerHTML = years.map(yr => {
    // Group by flat for this year
    const flatGroups = groupByFlat(byYear[yr]).sort((a,b) => b.amount - a.amount);
    const verGroups  = flatGroups.filter(g => g.anyVerified);
    const yrTotal    = verGroups.reduce((s,g) => s+g.amount, 0);
    const isOpen     = yr === currentYear;
    const podium     = isOpen && verGroups.length >= 2 ? buildPodiumHTML(verGroups) : '';

    return `<div class="year-section">
      <div class="year-header ${isOpen ? 'open' : ''}" id="yh-${yr}" onclick="toggleYear(${yr})">
        <div class="year-header-left">
          <span class="year-badge">${yr}</span>
          <span class="year-meta">${flatGroups.length} flat${flatGroups.length!==1?'s':''} · ${verGroups.length} verified</span>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem">
          <span class="year-total">₹${Math.round(yrTotal).toLocaleString('en-IN')}</span>
          <span class="year-chevron">▼</span>
        </div>
      </div>
      <div class="year-body ${isOpen ? 'open' : ''}" id="yb-${yr}">
        ${podium}
        ${cardsHTML(flatGroups)}
      </div>
    </div>`;
  }).join('');
}

function setFilter(m, el){
  filterMode = m;
  document.querySelectorAll('.filter-row .fchip').forEach(c => {
    if (c.closest('#towerFilter')) return; // don't touch tower chips
    c.classList.remove('on');
  });
  el.classList.add('on');
  renderList();
}

/* ── My Status: flat lookup without login ─────────────────────────────────── */
async function checkMyStatus() {
  const inp = document.getElementById('myFlatInp');
  const res = document.getElementById('myStatusResult');
  const flat = inp.value.trim();
  if (!flat) { inp.focus(); return; }

  res.style.display = 'block';
  res.innerHTML = '<div style="font-size:.82rem;color:#6b3a18">Checking…</div>';

  const _activeYr = (window.PSOTS && window.PSOTS.activeYear) || new Date().getFullYear();
  const wa = (window.PSOTS && window.PSOTS.waOrg) || '919482088904';
  let records = [];

  // Try Firestore first (loaded via firebase-config.js on this page)
  try {
    if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length) {
      const snap = await firebase.firestore().collection('contributions')
        .where('flat', '==', flat).orderBy('submittedAt', 'desc').get();
      if (!snap.empty) snap.forEach(d => records.push(d.data()));
    }
  } catch(e) { /* fall through to Apps Script */ }

  // Fallback to Apps Script
  if (!records.length) {
    const su = (window.PSOTS && window.PSOTS.scriptUrl) || localStorage.getItem('psots_script_url') || '';
    if (su) {
      try {
        const r = await fetch(su + '?action=myContribs&flat=' + encodeURIComponent(flat));
        const d = await r.json();
        if (Array.isArray(d.contribs)) records = d.contribs;
      } catch(e) {}
    }
  }

  if (!records.length) {
    res.innerHTML =
      '<div style="font-size:.84rem;color:#8b3000;font-weight:600;margin-bottom:.5rem">No contributions found for flat <strong>' + flat + '</strong></div>' +
      '<div style="font-size:.78rem;color:#6b3a18;line-height:1.55;margin-bottom:.7rem">Not submitted yet? You can contribute now, or if you already paid please contact the committee.</div>' +
      '<div style="display:flex;gap:.5rem;flex-wrap:wrap">' +
        '<a href="payment.html" style="display:inline-flex;align-items:center;gap:.35rem;background:linear-gradient(135deg,#e85c00,#c93800);color:#fff;border-radius:50px;padding:.45rem 1rem;font-size:.78rem;font-weight:700;text-decoration:none">💰 Contribute Now</a>' +
        '<a href="https://wa.me/' + wa + '?text=' + encodeURIComponent('Hi, I need help checking my contribution for Flat ' + flat + ' — PSOTS Chhath Puja 2026') + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:.35rem;background:#25d366;color:#fff;border-radius:50px;padding:.45rem 1rem;font-size:.78rem;font-weight:700;text-decoration:none">💬 WhatsApp Committee</a>' +
      '</div>';
    return;
  }

  // Show this year's record prominently, then history summary
  const thisYr = records.filter(r => Number(r.year) === _activeYr);
  const older  = records.filter(r => Number(r.year) !== _activeYr);

  function statusBadge(s) {
    if (!s) return '<span style="background:#fff8dc;color:#a07000;border-radius:50px;padding:.12rem .55rem;font-size:.72rem;font-weight:700">⏳ Pending</span>';
    if (s.includes('Received') || s.includes('✅')) return '<span style="background:#dcfce7;color:#166534;border-radius:50px;padding:.12rem .55rem;font-size:.72rem;font-weight:700">✅ Verified</span>';
    if (s.includes('Rejected') || s.includes('❌')) return '<span style="background:#fee2e2;color:#991b1b;border-radius:50px;padding:.12rem .55rem;font-size:.72rem;font-weight:700">❌ Rejected</span>';
    return '<span style="background:#fff8dc;color:#a07000;border-radius:50px;padding:.12rem .55rem;font-size:.72rem;font-weight:700">⏳ ' + s + '</span>';
  }

  const fmtAmt = n => '₹' + parseInt(n || 0).toLocaleString('en-IN');
  let html = '';

  if (thisYr.length) {
    const latest = thisYr[0];
    const isPending = !latest.status?.includes('Received') && !latest.status?.includes('❌');
    html += '<div style="background:#fff;border:1.5px solid #f0d5b8;border-radius:11px;padding:.8rem 1rem;margin-bottom:.6rem">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">' +
        '<span style="font-size:.85rem;font-weight:700;color:#1a0800">' + _activeYr + ' Contribution</span>' +
        statusBadge(latest.status) +
      '</div>' +
      '<div style="font-size:.8rem;color:#6b3a18">' + fmtAmt(latest.amount) + ' · ' + (latest.method || 'UPI') + (latest.date ? ' · ' + latest.date : '') + '</div>' +
      (isPending
        ? '<div style="margin-top:.65rem;display:flex;gap:.45rem;flex-wrap:wrap">' +
            '<a href="https://wa.me/' + wa + '?text=' + encodeURIComponent('Hi, I paid ₹' + parseInt(latest.amount).toLocaleString('en-IN') + ' for PSOTS Chhath Puja 2026. Flat: ' + flat + '. Please verify my contribution.') + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:.35rem;background:#25d366;color:#fff;border-radius:50px;padding:.4rem .85rem;font-size:.76rem;font-weight:700;text-decoration:none">💬 Remind Committee</a>' +
          '</div>'
        : '') +
      '</div>';
  } else {
    html += '<div style="font-size:.82rem;color:#8b3000;margin-bottom:.5rem">No contribution for <strong>' + _activeYr + '</strong> yet.</div>';
  }

  if (older.length) {
    const prev = older.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
    html += '<div style="font-size:.76rem;color:#6b3a18;margin-top:.3rem">Previous years: ' + older.length + ' contribution' + (older.length > 1 ? 's' : '') + ' totalling ' + fmtAmt(prev) + '</div>';
  }

  res.innerHTML = html;
}

loadList();
</script>
