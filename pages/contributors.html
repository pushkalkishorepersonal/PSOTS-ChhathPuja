<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Contributors — PSOTS Chhath 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Playfair+Display:ital,wght@0,700;0,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>

  <style>
  /* ── Filter / search ── */
  .filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.9rem;align-items:center}
  .fchip{background:var(--warm);border:1.5px solid #f0d5b8;color:var(--lbr);border-radius:50px;padding:.3rem .85rem;font-size:.74rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
  .fchip.on{background:var(--or);color:#fff;border-color:var(--or);box-shadow:0 3px 10px rgba(232,92,0,.3)}
  .con-search{width:100%;padding:.72rem 1rem .72rem 2.6rem;border:1.5px solid #f0d5b8;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--ink);background:var(--warm);outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:.9rem}
  .con-search:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(232,92,0,.1)}
  .search-wrap{position:relative}
  .search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--lbr);font-size:.9rem;pointer-events:none}

  /* ── Year section ── */
  .year-section{margin-bottom:.75rem;border-radius:14px;overflow:hidden;border:1.5px solid #f0dfc8}
  .year-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--warm);cursor:pointer;user-select:none;transition:background .15s}
  .year-header:hover{background:#fff0e0}
  .year-header-left{display:flex;align-items:center;gap:.6rem}
  .year-badge{font-family:'Yatra One',serif;font-size:1rem;color:var(--or);font-weight:700}
  .year-meta{font-size:.74rem;color:#6b3a18}
  .year-total{font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;color:var(--or)}
  .year-chevron{font-size:.75rem;color:var(--lbr);transition:transform .25s;flex-shrink:0}
  .year-header.open .year-chevron{transform:rotate(180deg)}
  .year-body{display:none;padding:.5rem .6rem .6rem}
  .year-body.open{display:block}

  /* ── Top-3 podium ── */
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:.75rem;margin-bottom:1.2rem;padding:.5rem 0}
  .pod-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;flex:1;max-width:120px;animation:podIn .6s cubic-bezier(.34,1.56,.64,1) both}
  .pod-item:nth-child(1){animation-delay:.3s}.pod-item:nth-child(2){animation-delay:.1s}.pod-item:nth-child(3){animation-delay:.5s}
  @keyframes podIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:none}}
  .pod-pedestal{width:100%;border-radius:10px 10px 0 0;display:flex;align-items:flex-end;justify-content:center;padding:.3rem;position:relative}
  .pod-1{background:linear-gradient(180deg,#ffc200,#e09000);height:72px}
  .pod-2{background:linear-gradient(180deg,#c0c0c0,#909090);height:52px}
  .pod-3{background:linear-gradient(180deg,#cd8032,#a06020);height:40px}
  .pod-rank{font-size:1.2rem;position:absolute;top:-18px;left:50%;transform:translateX(-50%)}
  .pod-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:900;font-size:1.1rem;color:#fff;border:2.5px solid rgba(255,255,255,.6);box-shadow:0 4px 14px rgba(26,8,0,.2);background:linear-gradient(135deg,var(--or),#c93800);margin-bottom:.4rem;overflow:hidden}
  .pod-name{font-size:.72rem;font-weight:700;color:var(--ink);text-align:center;line-height:1.3;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pod-flat{font-size:.65rem;color:#6b3a18}
  .pod-amt{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:900;color:var(--or)}

  /* ── Contributor rows ── */
  .con-item{display:grid;grid-template-columns:40px 40px 1fr auto auto;align-items:center;gap:.6rem;padding:.7rem .95rem;background:#fff;border-radius:10px;border:1px solid #f0dfc8;margin-bottom:.38rem;transition:background .15s,transform .15s,box-shadow .15s;opacity:0;transform:translateY(12px)}
  .con-item.seen{opacity:1;transform:none;transition:opacity .4s ease,transform .4s ease,background .15s,box-shadow .15s}
  .con-item:hover{background:#fff5e8;transform:translateX(3px);box-shadow:0 3px 14px rgba(26,8,0,.07)}
  .ci-rank{font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;color:rgba(107,58,24,.55);text-align:center}
  .ci-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--or),#c93800);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:900;font-size:.82rem;color:#fff;flex-shrink:0;overflow:hidden}
  .ci-name{font-weight:600;font-size:.88rem;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ci-flat{font-size:.72rem;color:#6b3a18}
  .ci-amt{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.88rem;color:var(--or);white-space:nowrap}
  .ci-dot{width:9px;height:9px;border-radius:50%;background:#4caf50;flex-shrink:0}
  .ci-dot.p{background:var(--gold)}

  /* ── Total bar ── */
  .total-bar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,var(--or),#c93800);border-radius:14px;padding:.95rem 1.2rem;margin-top:.9rem;color:#fff;box-shadow:0 6px 24px rgba(232,92,0,.3)}
  .tb-label{font-size:.78rem;opacity:.92}
  .tb-value{font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:900;letter-spacing:-.01em}
  .tb-count{font-size:.72rem;opacity:.8;margin-top:.08rem}

  /* ── Skeleton ── */
  .skel-row{display:flex;align-items:center;gap:.6rem;padding:.7rem .95rem;background:var(--warm);border-radius:12px;border:1px solid #f0dfc8;margin-bottom:.42rem}
  .skel-av{width:32px;height:32px;border-radius:50%;flex-shrink:0}
  .skel-body{flex:1;display:flex;flex-direction:column;gap:5px}
  .skel-line{height:12px;border-radius:4px}
  .skel,.skel-line{background:linear-gradient(90deg,#f0e8d8 25%,#ffe8cc 50%,#f0e8d8 75%);background-size:200% 100%;animation:shim 1.5s infinite}
  @keyframes shim{to{background-position:-200% 0}}

  /* ── Legend ── */
  .legend{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.8rem;font-size:.76rem;color:#6b3a18}
  .leg-item{display:flex;align-items:center;gap:.35rem}
  .leg-dot{width:9px;height:9px;border-radius:50%}
  </style>

<body>
<nav class="page-nav">
  <a class="page-nav-back" href="../index.html"><span class="page-nav-back-icon">←</span> Home</a>
  <div class="page-nav-title">🙏 Contributors</div>
  <button style="background:none;border:none;cursor:pointer;font-size:.75rem;color:rgba(255,220,120,.55);font-family:'DM Sans',sans-serif;padding:.25rem .5rem" onclick="loadList()">🔄 Refresh</button>
</nav>

<div class="page-hero" style="background:linear-gradient(135deg,#c94000,#8b2800)">
  <span class="ph-icon">🙏</span>
  <div class="ph-title">Contributors</div>
  <div class="ph-sub" id="subLine">Loading…</div>
</div>

<div class="page-content">
  <div class="card">

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="con-search" type="text" id="searchInp" placeholder="Search by name or flat number…" oninput="renderList(allData)"/>
    </div>

    <!-- Status Filters -->
    <div class="filter-row">
      <span style="font-size:.76rem;color:#6b3a18;font-weight:600">Show:</span>
      <div class="fchip on" onclick="setFilter('all',this)">All</div>
      <div class="fchip"    onclick="setFilter('verified',this)">Verified ✅</div>
      <div class="fchip"    onclick="setFilter('portal',this)">Portal 🔐</div>
      <div class="fchip"    onclick="setFilter('guest',this)">Guests 👤</div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#4caf50"></div>Verified by committee</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Pending verification</div>
    </div>

    <!-- Year sections rendered here -->
    <div id="conList">
      <div class="skel-row"><div class="skel-av skel"></div><div class="skel-body"><div class="skel-line skel" style="width:65%"></div><div class="skel-line skel" style="width:40%"></div></div></div>
      <div class="skel-row"><div class="skel-av skel"></div><div class="skel-body"><div class="skel-line skel" style="width:55%"></div><div class="skel-line skel" style="width:35%"></div></div></div>
      <div class="skel-row"><div class="skel-av skel"></div><div class="skel-body"><div class="skel-line skel" style="width:70%"></div><div class="skel-line skel" style="width:42%"></div></div></div>
    </div>

    <!-- Grand total bar -->
    <div class="total-bar">
      <div><div class="tb-label">Grand Total — All Years</div><div class="tb-count" id="verCount">—</div></div>
      <div class="tb-value count-num" id="totalAmt">—</div>
    </div>

    <div style="margin-top:.9rem;display:flex;gap:.7rem;flex-wrap:wrap">
      <a href="payment.html" style="text-decoration:none"><button class="btn-primary">💰 Contribute Now</button></a>
      <a href="../portal.html" style="text-decoration:none"><button class="btn-secondary">👤 My Contribution History</button></a>
    </div>
  </div>
</div>

<script>
let allData = [], filterMode = 'all';
const cfg = window.PSOTS || {};
const su = cfg.scriptUrl || localStorage.getItem('psots_script_url') || '';

const AV_COLORS = ['#e85c00','#c93800','#8b2800','#1a5276','#1a7a4e','#7b1fa2','#c62828'];
function avColor(name){ const c=(name||'?').toUpperCase().charCodeAt(0); return AV_COLORS[c % AV_COLORS.length]; }
function initial(name){ return (name||'?').charAt(0).toUpperCase(); }

function buildPodiumHTML(sorted) {
  const top = sorted.slice(0, 3);
  if (top.length < 2) return '';
  const medals = ['🥇','🥈','🥉'];
  const order = top.length >= 2 ? [1, 0, 2] : [0];
  const items = order.filter(i => top[i]);
  return `<div style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--or);font-weight:700;text-align:center;margin-bottom:.6rem">🏆 Top Contributors</div>
  <div class="podium">${items.map(idx => {
    const c = top[idx];
    const col = avColor(c.name);
    return `<div class="pod-item">
      <div class="pod-av" style="background:linear-gradient(135deg,${col},${col}cc)">${initial(c.name)}</div>
      <div class="pod-name">${c.name.split(' ')[0]}</div>
      <div class="pod-flat">Flat ${c.flat}</div>
      <div class="pod-amt">₹${parseInt(c.amount||0).toLocaleString('en-IN')}</div>
      <div class="pod-pedestal pod-${idx+1}"><div class="pod-rank">${medals[idx]}</div></div>
    </div>`;
  }).join('')}</div>`;
}

function animateCount(el, target) {
  const dur = 900, start = Date.now(), from = 0;
  const tick = () => {
    const p = Math.min(1, (Date.now()-start)/dur);
    const ease = 1 - Math.pow(1-p, 3);
    el.textContent = '₹' + Math.round(from + (target-from)*ease).toLocaleString('en-IN');
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function rowsHTML(list) {
  return list.map((c, i) => {
    const isV = c.status?.includes('Received');
    const col = avColor(c.name);
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
    return `<div class="con-item" style="transition-delay:${Math.min(i*30,300)}ms">
      <div class="ci-rank">${rankLabel}</div>
      <div class="ci-av" style="background:linear-gradient(135deg,${col},${col}cc)">${initial(c.name)}</div>
      <div>
        <div class="ci-name">${c.name}</div>
        <div class="ci-flat">Flat ${c.flat}</div>
      </div>
      <div class="ci-amt">₹${parseInt(c.amount||0).toLocaleString('en-IN')}</div>
      <div class="ci-dot ${isV?'':'p'}" title="${isV?'Verified ✅':'Pending verification'}"></div>
    </div>`;
  }).join('');
}

function toggleYear(yr) {
  const body = document.getElementById('yb-' + yr);
  const hdr  = document.getElementById('yh-' + yr);
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
}

async function loadList() {
  const el = document.getElementById('conList');
  el.innerHTML = `<div class="skel-row"><div class="skel-av skel"></div><div class="skel-body"><div class="skel-line skel" style="width:65%"></div><div class="skel-line skel" style="width:40%"></div></div></div>`.repeat(4);

  if (!su || su.includes('YOUR_APPS')) {
    allData = [];
    renderList(allData); return;
  }
  try {
    const r = await fetch(su + '?action=list');
    const d = await r.json();
    allData = d.contributors || [];
    renderList(allData);
  } catch(e) {
    el.innerHTML = '<div class="empty"><span class="empty-icon">⚠️</span>Could not load. Check connection and try again.</div>';
  }
}

function renderList(data) {
  const q = document.getElementById('searchInp').value.toLowerCase();

  /* Apply status filter */
  let f = data.filter(r => {
    const m = !q || r.name.toLowerCase().includes(q) || String(r.flat).toLowerCase().includes(q);
    if (!m) return false;
    if (filterMode==='verified') return r.status?.includes('Received');
    if (filterMode==='portal')   return r.accountType?.includes('Portal');
    if (filterMode==='guest')    return r.accountType?.includes('Guest');
    return true;
  });

  /* Grand total */
  const grandVerified = f.filter(r => r.status?.includes('Received'));
  const grandTotal = grandVerified.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
  document.getElementById('subLine').textContent = f.length + ' contributors across all years · ₹' + grandTotal.toLocaleString('en-IN') + ' total';
  animateCount(document.getElementById('totalAmt'), grandTotal);
  document.getElementById('verCount').textContent = grandVerified.length + ' verified contributions';

  /* Group by year, sorted newest first */
  const byYear = {};
  f.forEach(r => {
    const yr = r.year || 2026;
    (byYear[yr] = byYear[yr] || []).push(r);
  });
  const years = Object.keys(byYear).map(Number).sort((a,b) => b-a);

  if (!years.length) {
    const isSearch = q || filterMode !== 'all';
    document.getElementById('conList').innerHTML = isSearch
      ? '<div class="empty"><span class="empty-icon">🔍</span>No contributors match your search.</div>'
      : `<div class="empty" style="text-align:center;padding:2rem 1rem">
           <div style="font-size:2.4rem;margin-bottom:.6rem">🌅</div>
           <div style="font-family:'Yatra One',serif;font-size:1rem;color:var(--or);margin-bottom:.4rem">Contributions opening soon</div>
           <div style="font-size:.84rem;color:#6b3a18;line-height:1.65;max-width:280px;margin:0 auto">
             Be among the first to support PSOTS Chhath Puja 2026!
           </div>
           <a href="payment.html" style="display:inline-block;margin-top:1.1rem;text-decoration:none;background:linear-gradient(135deg,var(--or),#c93800);color:#fff;border-radius:50px;padding:.65rem 1.6rem;font-size:.88rem;font-weight:700;font-family:'DM Sans',sans-serif">💰 Contribute Now</a>
         </div>`;
    return;
  }

  const currentYear = new Date().getFullYear();

  document.getElementById('conList').innerHTML = years.map(yr => {
    const list = byYear[yr].sort((a,b) => (parseFloat(b.amount)||0)-(parseFloat(a.amount)||0));
    const verList = list.filter(r => r.status?.includes('Received'));
    const yrTotal = verList.reduce((s,r) => s + (parseFloat(r.amount)||0), 0);
    const isOpen = yr === currentYear; /* expand current year by default */

    const podium = isOpen && verList.length >= 2
      ? buildPodiumHTML(verList)
      : '';

    return `<div class="year-section">
      <div class="year-header ${isOpen ? 'open' : ''}" id="yh-${yr}" onclick="toggleYear(${yr})">
        <div class="year-header-left">
          <span class="year-badge">${yr}</span>
          <span class="year-meta">${list.length} contributor${list.length!==1?'s':''} · ${verList.length} verified</span>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem">
          <span class="year-total">₹${yrTotal.toLocaleString('en-IN')}</span>
          <span class="year-chevron">▼</span>
        </div>
      </div>
      <div class="year-body ${isOpen ? 'open' : ''}" id="yb-${yr}">
        ${podium}
        ${rowsHTML(list)}
      </div>
    </div>`;
  }).join('');

  /* Staggered reveal */
  const ro = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('seen'); ro.unobserve(e.target); }});
  }, { threshold: 0.05 });
  document.querySelectorAll('.con-item').forEach(el => ro.observe(el));
}

function setFilter(m, el){
  filterMode = m;
  document.querySelectorAll('.filter-row .fchip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  renderList(allData);
}

loadList();
</script>
</body>
