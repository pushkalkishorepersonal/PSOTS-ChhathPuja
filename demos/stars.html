<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shooting Stars</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Yatra+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:100%;height:100vh;overflow:hidden;background:linear-gradient(180deg,#05020f 0%,#120830 15%,#2d0800 40%,#7a1e00 60%,#e85c00 78%,#ffc200 90%,#0d2244 100%);font-family:'DM Sans',sans-serif}
  canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}
  .hero{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:2rem}
  .badge{font-size:.72rem;letter-spacing:.22em;color:rgba(255,224,117,.85);margin-bottom:.8rem;text-transform:uppercase}
  h1{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(3rem,8vw,5.5rem);color:#ffc200;line-height:1;text-shadow:0 0 40px rgba(255,140,0,.5)}
  .hindi{font-family:'Yatra One',serif;font-size:clamp(1rem,2.5vw,1.4rem);color:rgba(255,224,117,.9);margin-top:.5rem}
  .card{margin-top:2.5rem;background:rgba(5,2,15,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,194,0,.3);border-radius:16px;padding:1rem 2rem;color:#ffe680;font-size:.88rem;max-width:340px}
  .card strong{display:block;font-size:1rem;margin-bottom:.3rem}
  .card span{color:rgba(255,240,180,.75);font-size:.8rem;line-height:1.5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hero">
  <div class="badge">Animation Preview · Option 3</div>
  <h1>Chhath</h1>
  <div class="hindi">छठ महापर्व</div>
  <div class="card">
    <strong>✨ Shooting Stars</strong>
    <span>80 twinkling background stars plus bright meteors streaking across the pre-dawn sky every few seconds — subtle but magical</span>
  </div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,stars=[],meteors=[],frame=0,nextM=120;
function resize(){
  W=c.width=innerWidth;H=c.height=innerHeight;
  stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*.65,sz:.5+Math.random()*1.8,a:.4+Math.random()*.6,ts:.01+Math.random()*.025,to:Math.random()*Math.PI*2}));
}
window.addEventListener('resize',resize);resize();
function spawnMeteor(){
  const ang=(210+Math.random()*30)*Math.PI/180,sp=8+Math.random()*7;
  meteors.push({x:Math.random()*W,y:Math.random()*H*.4,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,len:80+Math.random()*120,a:1,life:0,max:28+Math.floor(Math.random()*20)});
}
function tick(){
  frame++;ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    const tw=Math.sin(frame*s.ts+s.to),alpha=s.a*(.6+.4*tw);
    ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#fff8e0';
    ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  if(frame>=nextM){spawnMeteor();nextM=frame+180+Math.floor(Math.random()*240)}
  meteors=meteors.filter(m=>{
    const prog=m.life/m.max;m.a=1-prog;
    const tx=m.x-(m.vx/Math.abs(m.vx||1))*m.len*m.a,ty=m.y-(m.vy/Math.abs(m.vy||1))*m.len*m.a;
    const g=ctx.createLinearGradient(tx,ty,m.x,m.y);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(.6,`rgba(255,240,180,${m.a*.4})`);g.addColorStop(1,`rgba(255,255,255,${m.a})`);
    ctx.save();ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.shadowColor='rgba(255,220,100,.8)';ctx.shadowBlur=4;
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(m.x,m.y);ctx.stroke();
    ctx.globalAlpha=m.a;ctx.fillStyle='#fff';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(m.x,m.y,1.5,0,Math.PI*2);ctx.fill();ctx.restore();
    m.x+=m.vx;m.y+=m.vy;m.life++;
    return m.life<m.max&&m.x>-50&&m.y<H+50;
  });
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
