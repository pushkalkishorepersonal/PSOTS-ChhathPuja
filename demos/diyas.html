<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diya Flames</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Yatra+One&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:100%;height:100vh;overflow:hidden;background:linear-gradient(180deg,#1a0d30 0%,#2d0800 25%,#5c1400 50%,#c44a00 70%,#0d2244 80%,#08152e 100%);font-family:'DM Sans',sans-serif}
  canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}
  .hero{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:8%;height:100vh;text-align:center;padding-left:2rem;padding-right:2rem}
  .badge{font-size:.72rem;letter-spacing:.22em;color:rgba(255,224,117,.85);margin-bottom:.8rem;text-transform:uppercase}
  h1{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(3rem,8vw,5.5rem);color:#ffc200;line-height:1;text-shadow:0 0 40px rgba(255,140,0,.5)}
  .hindi{font-family:'Yatra One',serif;font-size:clamp(1rem,2.5vw,1.4rem);color:rgba(255,224,117,.9);margin-top:.5rem}
  .card{margin-top:2rem;background:rgba(26,13,48,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,140,0,.35);border-radius:16px;padding:1rem 2rem;color:#ffe680;font-size:.88rem;max-width:340px}
  .card strong{display:block;font-size:1rem;margin-bottom:.3rem}
  .card span{color:rgba(255,230,128,.75);font-size:.8rem;line-height:1.5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hero">
  <div class="badge">Animation Preview · Option 4</div>
  <h1>Chhath</h1>
  <div class="hindi">छठ महापर्व</div>
  <div class="card">
    <strong>🪔 Diya Flames</strong>
    <span>12 realistic oil lamps with individual flickering flames, warm amber glow halos, clay bowl bases, and subtle water reflections below</span>
  </div>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H,diyas=[],frame=0;
function resize(){
  W=c.width=innerWidth;H=c.height=innerHeight;
  const wy=H*.75;
  diyas=Array.from({length:12},(_,i)=>({
    x:(W/13)*(i+1),by:wy-10+Math.random()*12-6,sc:.7+Math.random()*.6,
    fo:Math.random()*Math.PI*2,fs:.06+Math.random()*.06,
    dp:Math.random()*Math.PI*2,ds:.008+Math.random()*.006,
  }));
}
window.addEventListener('resize',resize);resize();
function drawDiya(d){
  const fl=Math.sin(frame*d.fs+d.fo),fl2=Math.sin(frame*d.fs*1.7+d.fo+1.2);
  const fh=(22+fl*4+fl2*2)*d.sc,fw=(7+fl*1.5)*d.sc,gr=(28+fl*6)*d.sc;
  const dr=Math.sin(frame*d.ds+d.dp)*6,cx=d.x+dr,cy=d.by;
  ctx.save();
  const gg=ctx.createRadialGradient(cx,cy-fh*.3,0,cx,cy,gr*1.6);
  gg.addColorStop(0,'rgba(255,180,0,.22)');gg.addColorStop(.4,'rgba(255,100,0,.1)');gg.addColorStop(1,'rgba(255,60,0,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cx,cy-fh*.3,gr*1.6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#b5540a';ctx.beginPath();ctx.ellipse(cx,cy+3*d.sc,11*d.sc,4*d.sc,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8b3a06';ctx.beginPath();ctx.ellipse(cx,cy+5*d.sc,13*d.sc,3.5*d.sc,0,0,Math.PI*2);ctx.fill();
  const fg=ctx.createLinearGradient(cx,cy,cx,cy-fh);
  fg.addColorStop(0,'rgba(255,80,0,1)');fg.addColorStop(.35,'rgba(255,160,0,1)');fg.addColorStop(.65,'rgba(255,220,80,.9)');fg.addColorStop(1,'rgba(255,255,200,.1)');
  ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(cx,cy-fh);
  ctx.bezierCurveTo(cx+fw,cy-fh*.55,cx+fw*.7,cy-fh*.15,cx,cy);
  ctx.bezierCurveTo(cx-fw*.7,cy-fh*.15,cx-fw,cy-fh*.55,cx,cy-fh);ctx.fill();
  const cg=ctx.createLinearGradient(cx,cy-4*d.sc,cx,cy-fh*.7);
  cg.addColorStop(0,'rgba(255,230,100,.9)');cg.addColorStop(1,'rgba(255,255,220,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(cx,cy-fh*.3,fw*.35,fh*.38,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function tick(){
  frame++;ctx.clearRect(0,0,W,H);
  diyas.forEach(d=>drawDiya(d));
  const wy=H*.75;
  const rg=ctx.createLinearGradient(0,wy,0,wy+H*.12);
  rg.addColorStop(0,'rgba(255,140,0,.12)');rg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=rg;ctx.fillRect(0,wy,W,H*.12);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
